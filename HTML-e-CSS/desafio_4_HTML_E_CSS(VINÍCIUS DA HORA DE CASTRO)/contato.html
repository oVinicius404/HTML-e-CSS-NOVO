<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Vinícius">
    <meta name="description" content="A empresa Ford está lançando um novo veículo e, portanto, decidiu reformular o seu portal na web.">
    <meta name="keywords" content="Ford, veículo, carro, lançamento, Ranger, Ranger Black">
    <link rel="stylesheet" href="style/contato.css">
    <link rel="stylesheet" href="style/headfoot.css">

    <title>Ford - Contato - Novo Veículo</title>
</head>
<body>

    <header>

        <div class="logo">
            <img src="images/logo-ford-256.png" alt="Ford Logo" class="logo_img">
        </div>

        <nav class="cabeçalho">
            <a href="index.html" class="cabeçalho_link">Home</a>
            <a href="lançamento.html" class="cabeçalho_link">Lançamento</a>
            <a href="contato.html" class="cabeçalho_link" id="ativo">Contato</a>
        </nav>

    </header>

    <main>

        <div class="carro">
            <img class="carro_img" src="images/xls 2.2 diesel.jpg" alt="XLS 2.2 Diesel">
        </div>

        <form class="formulario_todo">

            <h1 class="sobre">Sobre Você</h1>
            
            <div class="inputs">
                <input class="formulario" type="text" placeholder="NOME DE USUÁRIO*" name="NOME DE USUÁRIO*">
                <input class="formulario" type="email" placeholder="E-MAIL*" name="E-MAIL*">
                <input class="formulario" type="tel" pattern="[0-9]{11}|[0-9]{2} [0-9]{9}|[0-9]{2} [0-9]{5}-[0-9]{4}|[0-9]{2} [0-9]{5} [0-9]{4}" title="Formato esperado: 71 91234-5678" placeholder="TELEFONE*" name="TELEFONE*">
            </div>
            
            <div class="contatado">
                <select class="formulario" name="TIPO DE CONTATO">
                    <option value="" selected hidden disabled>TIPO DE CONTATO</option>
                    <option value="Elogio">Elogio</option>
                    <option value="Reclamação">Reclamação</option>
                    <option value="Solicitação">Solicitação</option>
                </select>
                
                <input class="formulario" type="text" placeholder="MENSAGEM" name="MENSAGEM">
                
                <div class="enviar">
                    <input type="submit" class="enviar_botao"></input>
                </div>
            </div>
            
            
        </form>

    </main>

    <footer>

        <div class="redes">
            <p>Redes Sociais</p>

            <div class="social_img">
                <a target="_blank" href="https://www.facebook.com/FordBrasil/?locale=pt_BR"><img
                        src="images/facebook-50.png" alt="Facebook Logo" class="social_links"></a>
                <a target="_blank" href="http://youtube.com/@fordbrasil"><img src="images/youtube-squared-50.png"
                        alt="YouTube Logo" class="social_links"></a>
                <a target="_blank" href="https://www.instagram.com/fordbrasil/"><img src="images/instagram-logo-50.png"
                        alt="Instagram Logo" class="social_links"></a>
            </div>
        </div>

        <nav class="social">
            <div class="copyright">
                <P>&copy; 2026 Ford Brasil | Viva o Novo. Todos os direitos reservados.</P>
            </div>

            <div class="logo2">
                <img src="images/ford-96.png" alt="Ford Logo" class="logo_img2">
            </div>
        </nav>

    </footer>
    
</body>
</html>
